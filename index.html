<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>

    <link rel="stylesheet" href="simulador.css">

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <img src="Produbanco_Logo.png" alt="Logo Banco">
            </div>
            <h1>Simulador de Crédito</h1>
        </header>

        <!-- GRID PRINCIPAL -->
        <div class="grid">

            <div class="columna">
                <h2>Datos financieros</h2>

                <label>Ingresos:</label>
                <input type="text" id="txtIngresos" onblur="validarIngresos()">
                <small id="errorIngresos" class="error"></small>

                <label>Egresos:</label>
                <input type="text" id="txtEgresos" onblur="validarEgresos()">
                <small id="errorEgresos" class="error"></small>

                <p>Disponible: <span id="spnDisponible"></span></p>
                <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
            </div>

            <div class="columna">
                <h2>Solicitud de crédito</h2>

                <label>Arriendo:</label>
                <input type="text" id="txtMonto" onblur="validarMonto()">
                <small id="errorMonto" class="error"></small>

                <label>Alimentacion:</label>
                <input type="text" id="txtPlazo" onblur="validarPlazo()">
                <small id="errorPlazo" class="error"></small>

                <label>Varios:</label>
                <input type="text" id="txtTasaInteres" onblur="validarTasaInteres()">
                <small id="errorTasaInteres" class="error"></small>

                <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
                <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
                <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
                <p>Estado: <span id="spnEstadoCredito">ANALIZANDO...</span></p>

                <div class="buttons">
                    <button onclick="calcular()">Calcular Crédito</button>
                    <button id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
